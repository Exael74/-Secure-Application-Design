spring.application.name=security-app

# H2 (demo/local). Replace with RDS/MySQL in AWS if needed.
spring.datasource.url=jdbc:h2:file:./data/securitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS origin for local Apache-client simulation server
app.security.allowed-origin=http://localhost:8080

# TLS disabled locally by default.
server.port=8443
server.ssl.enabled=false

# Enable if you want local HTTPS with self-signed PKCS12 keystore.
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=spring
