# Apache TLS VirtualHost example for AL2023 / Amazon Linux
# Adjust domain, paths, and proxy/security rules as needed.

<VirtualHost *:80>
    ServerName your-client-domain.example.com
    Redirect permanent / https://your-client-domain.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName your-client-domain.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/your-client-domain.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/your-client-domain.example.com/privkey.pem

    DocumentRoot /var/www/html/security-client
    <Directory /var/www/html/security-client>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"

    ErrorLog /var/log/httpd/security-client-error.log
    CustomLog /var/log/httpd/security-client-access.log combined
</VirtualHost>
