<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Workshop Client</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="container">
    <h1>Security App Client</h1>
    <p class="subtitle">Async HTML + JavaScript over TLS</p>

    <section class="card">
        <h2>Register</h2>
        <form id="registerForm">
            <label>
                Username
                <input type="text" id="regUsername" required minlength="3">
            </label>
            <label>
                Email
                <input type="email" id="regEmail" required>
            </label>
            <label>
                Password
                <input type="password" id="regPassword" required minlength="8">
            </label>
            <button type="submit">Register</button>
        </form>
    </section>

    <section class="card">
        <h2>Login</h2>
        <form id="loginForm">
            <label>
                Username
                <input type="text" id="loginUsername" required>
            </label>
            <label>
                Password
                <input type="password" id="loginPassword" required>
            </label>
            <button type="submit">Login</button>
        </form>
    </section>

    <section class="card">
        <h2>Protected API</h2>
        <button id="loadProfileBtn" type="button">Load Profile</button>
    </section>

    <section class="card output">
        <h2>Output</h2>
        <pre id="output"></pre>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
